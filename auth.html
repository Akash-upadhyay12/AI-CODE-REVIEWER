<!DOCTYPE html>
<html>
<head>
    <title>AI Code Reviewer - Auth</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-container">
        <h1>AI Code Reviewer</h1>
        <p>Review your code with AI assistance</p>

        <div class="form-box">
            <input type="text" id="username" placeholder="Enter Username" style="display: none;">
            <input type="email" placeholder="Enter Email">
            <input type="password" placeholder="Enter Password">

            <button id="signinbtn">Sign In</button>
            <p class="signup-text">
    Don't have an account? <a id="signupLink" href="#">Sign Up</a>
</p>

            <div class="divider">OR</div>

            <button id="guestbtn">Continue as Guest</button>
        </div>
    </div>

    <script>
        document.getElementById("guestbtn").addEventListener("click", function(){
            window.location.href = "index.html";
            
        });
        document.getElementById("signupLink").addEventListener("click", function(e){
            e.preventDefault();
            document.querySelector("h1").innerText ="Create Account";

            document.getElementById("signinbtn").innerText ="Sign Up";
            document.getElementById("username").style.display="block";
            
            
        })
        
    </script>

</body>
</html>
